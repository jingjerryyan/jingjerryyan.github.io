---
layout: compress
---

{% include base_path %}

<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js"{% if site.site_theme == "dark" %} data-theme="dark"{% endif %}>
  <head>
    {% include head.html %}
    {% include head/custom.html %}
  </head>

  <body>

    <!-- Site-wide ambient background (ivory hero effect) -->
    <div class="site-bg" aria-hidden="true">
      <canvas class="hero__canvas site-bg__canvas"></canvas>
      <div class="hero__grid site-bg__grid"></div>
      <div class="hero__aurora site-bg__aurora"></div>
    </div>
    <div class="hero__status site-bg__status" aria-hidden="true">
      <span class="hero__status-dot"></span>
    </div>

    {% include browser-upgrade.html %}
    {% include masthead.html %}

    {{ content }}

    <div class="page__footer">
      <footer>
        {% include footer/custom.html %}
        {% include footer.html %}
      </footer>
    </div>

    {% include scripts.html %}
    <script src="/assets/js/hero.js"></script>

  </body>
</html>
